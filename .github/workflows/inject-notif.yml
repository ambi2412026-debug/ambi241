name: Inject notif-engine into index.html

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject script tag
        run: |
          sed -i 's|</body>|<script src="ambi241-notif-engine.js" defer></script>\n</body>|' index.html

      - name: Verify
        run: grep -n 'ambi241-notif-engine' index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "feat: inject ambi241-notif-engine into index.html"
          git push
